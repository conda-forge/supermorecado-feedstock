{% set name = "supermorecado" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/supermorecado-{{ version }}.tar.gz
  sha256: e64f5667d7f00117486d04876aa58622b38f356b19e2c61ae29332f2cabf50e1

build:
  entry_points:
    - supermorecado = supermorecado.scripts.cli:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit >=3.2,<4
    - pip
  run:
    - python >={{ python_min }}
    - morecantile
    - rasterio
    - attrs
    - affine
    - cligj
    - numpy
    - click

test:
  imports:
    - supermorecado
  commands:
    - pip check
    - supermorecado --help
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Extend the functionality of morecantile with additional commands.
  home: https://github.com/developmentseed/supermorecado
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - AndrewAnnex
